name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the v prefix"
        required: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check actor
        run: |
          if [ "${{ github.actor }}" != "PSyron" ]; then
            echo "Only PSyron may start a release workflow."
            exit 1
          fi

      - name: Require main branch
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "Releases must be started from main."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Resolve release version
        id: version
        run: |
          version=$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [ "$version" != "${{ inputs.version }}" ]; then
            echo "Input version ${{ inputs.version }} does not match pyproject version $version."
            exit 1
          fi

      - name: Ensure release tag does not already exist
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists."
            exit 1
          fi

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src apps

      - name: Test
        run: uv run pytest

      - name: Build distributions
        run: uv build --out-dir dist

      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI and create GitHub release
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check actor
        run: |
          if [ "${{ github.actor }}" != "PSyron" ]; then
            echo "Only PSyron may publish a release."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

      - name: Create GitHub release and tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          gh release create "v$VERSION" dist/* \
            --title "v$VERSION" \
            --generate-notes
